name: Daily Currency Report

on:
  schedule:
    # Temporary test schedule: every 5 minutes from minute 20 of each hour.
    # For Asia/Novosibirsk this includes 20:20, 20:25, 20:30, etc.
    - cron: "20,25,30,35,40,45,50,55 * * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          RUN_ONCE: "true"
          TIMEZONE: Asia/Novosibirsk
          HTTP_TIMEOUT_SECONDS: "20"
        run: python src/bot.py
